services:
  backend:
    build:
      context: ./backend
    container_name: freelance-daigest-backend
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-13000}:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:18080}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_OIDC_AUTHORITY: ${VITE_OIDC_AUTHORITY}
        VITE_OIDC_CLIENT_ID: ${VITE_OIDC_CLIENT_ID}
        VITE_OIDC_SCOPES: ${VITE_OIDC_SCOPES:-openid profile email}
        VITE_API_BASE_URL: /api
    container_name: freelance-daigest-frontend
    expose:
      - "8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
